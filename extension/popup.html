<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="logo">📝</span>
    <h1>Revise</h1>
  </div>

  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
    <a href="#" id="resyncBtn" style="display:none;margin-left:auto;font-size:10px;color:#7c9cff;text-decoration:none;">Re-sync Login</a>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Login View -->
  <div class="form-section" id="loginView" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <button class="btn btn-primary" id="sendMagicLinkBtn">Send Magic Link</button>
    <p id="loginStatus" style="font-size:12px;color:#888;margin-top:8px;text-align:center;"></p>
  </div>

  <!-- View 1: Start — capture URL and begin timer -->
  <div class="form-section" id="startView" style="display:none">
    <div class="field">
      <label>Type</label>
      <select id="questionType">
        <option value="dsa" selected>DSA</option>
        <option value="machine_coding">Machine Coding</option>
        <option value="lld">LLD</option>
        <option value="hld">HLD</option>
      </select>
    </div>
    <div class="field">
      <label>URL</label>
      <input type="text" id="url" readonly>
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="title" placeholder="Problem title (optional)">
    </div>
    <div id="patternTag" style="display:none;margin-bottom:8px;">
      <span style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.5px;">Pattern</span>
      <span id="patternLabel" style="display:inline-block;font-size:11px;background:#1e1b4b;color:#a5b4fc;padding:2px 8px;border-radius:4px;margin-left:4px;"></span>
    </div>
    <div id="existingMeta" class="existing-meta" style="display:none;"></div>
    <button class="btn btn-timer" id="startTimerBtn">Start Timer</button>
  </div>

  <!-- View 2: Timer running — show elapsed time, pause/stop -->
  <div class="timer-banner" id="timerView" style="display:none">
    <div class="timer-info">
      <span class="timer-label">Timer running</span>
      <span class="timer-title" id="timerTitle"></span>
    </div>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-controls">
      <button class="timer-btn pause" id="pauseBtn">Pause</button>
      <button class="timer-btn stop" id="stopBtn">Stop</button>
      <button class="timer-btn cancel" id="cancelBtn">Cancel</button>
    </div>
  </div>

  <!-- View 3: Finish — fill in details after solving -->
  <div class="form-section" id="finishView" style="display:none">
    <div class="finish-header">
      <span class="finish-title" id="finishTitle"></span>
      <span class="finish-time" id="finishTime"></span>
    </div>

    <div class="row">
      <div class="field">
        <label>Difficulty</label>
        <select id="difficulty">
          <option value="">Select</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="field">
        <label>Pattern</label>
        <select id="patternSelect" style="font-size:11px;">
          <option value="">None</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Self Rating</label>
      <div class="stars" id="stars">
        <button class="star" data-value="1">★</button>
        <button class="star" data-value="2">★</button>
        <button class="star" data-value="3">★</button>
        <button class="star" data-value="4">★</button>
        <button class="star" data-value="5">★</button>
      </div>
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea id="notes" placeholder="Key insights, things to remember..."></textarea>
    </div>

    <button class="btn btn-primary" id="finishBtn" disabled>Save & Finish</button>
    <a href="#" class="discard-link" id="discardLink">Discard this attempt</a>
  </div>

  <div class="revisions-section">
    <h3>Due for Revision <span class="badge" id="revCount">0</span></h3>
    <div class="revision-list" id="revisionList">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="openOverlayLink">Open Notes Overlay</a>
    <span style="color:#333;margin:0 6px;">|</span>
    <a href="https://revise.mrinal.dev/dashboard" target="_blank">Dashboard ↗</a>
    <a href="#" id="signOutLink" style="display:none;margin-left:12px;color:#e74c3c;">Sign Out</a>
  </div>

  <script src="patterns.js"></script>
  <script src="popup.js"></script>
</body>
</html>
