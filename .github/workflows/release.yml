name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build extension.zip
        working-directory: extension
        run: zip -r ../extension.zip . -x "*.DS_Store"
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" extension.zip --clobber
