<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Revise</title>
<style>
  :root {
    --bg:#0a0a0a; --bg-card:#111; --bg-hover:#1a1a1a;
    --border:#222; --border-light:#333;
    --text:#e0e0e0; --text-dim:#888; --text-muted:#555;
    --accent:#5b6abf; --accent-dim:#3d4a8a;
    --green:#34d399; --yellow:#fbbf24; --red:#f87171;
    --font-sans:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-sans); background:var(--bg); color:var(--text); min-height:100vh; }
  a { color:var(--accent); text-decoration:none; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:5;
  }
  header h1 { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
  header .sub { font-size:12px; color:var(--text-dim); margin-top:2px; }
  header nav a { font-size:13px; margin-left:18px; color:var(--text-dim); }
  header nav a:hover { color:var(--text); }

  .wrap { max-width:1000px; margin:0 auto; padding:28px; }

  .panel {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:10px; padding:20px 22px; margin-bottom:22px;
  }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:14px; }

  .grant-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  input[type=email], select {
    padding:9px 12px; border-radius:7px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); font-size:13px; font-family:inherit;
  }
  input[type=email] { flex:1; min-width:220px; }
  input:focus, select:focus { outline:none; border-color:var(--accent); }
  button.primary {
    padding:9px 16px; border-radius:7px; border:none; cursor:pointer;
    background:var(--accent); color:#fff; font-size:13px; font-weight:600;
  }
  button.primary:hover { background:var(--accent-dim); }
  button.primary:disabled { opacity:.5; cursor:default; }

  .msg { margin-top:12px; font-size:13px; min-height:18px; }
  .msg.ok { color:var(--green); }
  .msg.err { color:var(--red); }

  table { width:100%; border-collapse:collapse; }
  th {
    text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.7px;
    color:var(--text-muted); padding:10px 12px; border-bottom:1px solid var(--border);
  }
  td { padding:12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
  tr:hover td { background:var(--bg-hover); }
  .email { font-weight:600; }
  .uid { font-size:11px; color:var(--text-muted); font-family:ui-monospace,monospace; }
  .last { font-size:11px; color:var(--text-dim); }
  .badge {
    display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; padding:2px 7px; border-radius:6px;
    background:var(--accent-dim); color:#fff; margin-left:6px;
  }

  /* toggle pill */
  .flags { display:flex; gap:8px; flex-wrap:wrap; }
  .flag {
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    font-size:12px; padding:5px 10px; border-radius:16px;
    border:1px solid var(--border-light); color:var(--text-dim); user-select:none;
  }
  .flag.on { background:rgba(52,211,153,.12); border-color:var(--green); color:var(--green); }
  .flag.busy { opacity:.5; cursor:default; }
  .flag .dot { width:7px; height:7px; border-radius:50%; background:currentColor; }

  .adminbtn {
    font-size:11px; padding:5px 10px; border-radius:6px; cursor:pointer;
    border:1px solid var(--border-light); background:transparent; color:var(--text-dim);
  }
  .adminbtn.on { border-color:var(--yellow); color:var(--yellow); }
  .adminbtn:disabled { opacity:.4; cursor:default; }

  .empty { color:var(--text-muted); font-size:13px; padding:24px 12px; text-align:center; }
</style>
</head>
<body>

<!-- Admin-only gate (server also enforces on every /api/admin/* call). -->
<script src="/static/access.js"></script>
<script>window.__me = AccessGate.guard(null, { admin: true });</script>

<header>
  <div>
    <h1>Admin · Access & Features</h1>
    <div class="sub">Grant per-user access to gated features like <code>/research</code>.</div>
  </div>
  <nav>
    <a href="/research">Research</a>
    <a href="/dashboard">Dashboard</a>
  </nav>
</header>

<div class="wrap">

  <div class="panel">
    <h2>Grant access by email</h2>
    <div class="grant-row">
      <input type="email" id="grant-email" placeholder="person@example.com" autocomplete="off">
      <select id="grant-feature"></select>
      <button class="primary" id="grant-btn" onclick="grantByEmail()">Grant</button>
    </div>
    <div class="msg" id="grant-msg"></div>
    <div class="sub" style="margin-top:8px;color:var(--text-muted);font-size:12px">
      The person must have signed in at least once (magic link) so their account exists.
    </div>
  </div>

  <div class="panel">
    <h2>Users</h2>
    <table>
      <thead>
        <tr><th>User</th><th>Features</th><th>Admin</th></tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="3" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const API = '/api';
let FEATURES = [];
let ME = null;

async function api(path, options = {}) {
  const auth = AccessGate.getAuth();
  const headers = Object.assign(
    { 'Content-Type': 'application/json' },
    options.headers || {},
    auth ? { Authorization: 'Bearer ' + auth.access_token } : {}
  );
  const resp = await fetch(API + path, Object.assign({}, options, { headers }));
  if (!resp.ok) {
    let detail = 'Request failed (' + resp.status + ')';
    try { detail = (await resp.json()).detail || detail; } catch {}
    throw new Error(detail);
  }
  return resp.status === 204 ? null : resp.json();
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}

function fmtDate(s) {
  if (!s) return 'never signed in';
  try { return new Date(s).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
  catch { return s; }
}

function renderUsers(users) {
  const body = document.getElementById('users-body');
  if (!users.length) {
    body.innerHTML = '<tr><td colspan="3" class="empty">No users yet.</td></tr>';
    return;
  }
  body.innerHTML = users.map(u => {
    const flags = FEATURES.map(f => {
      const on = u.features.indexOf(f) !== -1;
      return '<span class="flag ' + (on ? 'on' : '') + '" ' +
        'data-uid="' + esc(u.user_id) + '" data-feature="' + esc(f) + '" ' +
        'onclick="toggleFeature(this)"><span class="dot"></span>' + esc(f) + '</span>';
    }).join('');
    const isSelf = ME && u.user_id === ME.user_id;
    const adminBtn = '<button class="adminbtn ' + (u.is_admin ? 'on' : '') + '" ' +
      'data-uid="' + esc(u.user_id) + '" data-admin="' + (u.is_admin ? '1' : '0') + '" ' +
      (isSelf && u.is_admin ? 'disabled title="You can’t remove your own admin access"' : '') +
      ' onclick="toggleAdmin(this)">' + (u.is_admin ? 'Admin ✓' : 'Make admin') + '</button>';
    return '<tr>' +
      '<td><div class="email">' + esc(u.email || '(no email)') +
        (isSelf ? '<span class="badge">you</span>' : '') + '</div>' +
        '<div class="uid">' + esc(u.user_id) + '</div>' +
        '<div class="last">' + fmtDate(u.last_sign_in_at) + '</div></td>' +
      '<td><div class="flags">' + (flags || '<span class="uid">—</span>') + '</div></td>' +
      '<td>' + adminBtn + '</td>' +
      '</tr>';
  }).join('');
}

async function loadUsers() {
  try {
    const users = await api('/admin/users');
    renderUsers(users);
  } catch (e) {
    document.getElementById('users-body').innerHTML =
      '<tr><td colspan="3" class="empty">' + esc(e.message) + '</td></tr>';
  }
}

async function toggleFeature(el) {
  if (el.classList.contains('busy')) return;
  const uid = el.dataset.uid, feature = el.dataset.feature;
  const granted = !el.classList.contains('on');
  el.classList.add('busy');
  try {
    await api('/admin/users/' + encodeURIComponent(uid) + '/features', {
      method: 'POST',
      body: JSON.stringify({ feature, granted }),
    });
    el.classList.toggle('on', granted);
  } catch (e) {
    alert('Could not update: ' + e.message);
  } finally {
    el.classList.remove('busy');
  }
}

async function toggleAdmin(el) {
  const uid = el.dataset.uid;
  const makeAdmin = el.dataset.admin !== '1';
  if (!makeAdmin && !confirm('Remove admin access for this user?')) return;
  el.disabled = true;
  try {
    await api('/admin/users/' + encodeURIComponent(uid) + '/admin', {
      method: 'POST',
      body: JSON.stringify({ is_admin: makeAdmin }),
    });
    await loadUsers();
  } catch (e) {
    alert('Could not update: ' + e.message);
    el.disabled = false;
  }
}

async function grantByEmail() {
  const emailEl = document.getElementById('grant-email');
  const featureEl = document.getElementById('grant-feature');
  const msg = document.getElementById('grant-msg');
  const btn = document.getElementById('grant-btn');
  const email = emailEl.value.trim();
  msg.className = 'msg'; msg.textContent = '';
  if (!email) { msg.className = 'msg err'; msg.textContent = 'Enter an email.'; return; }
  btn.disabled = true;
  try {
    const res = await api('/admin/grant-by-email', {
      method: 'POST',
      body: JSON.stringify({ email, feature: featureEl.value }),
    });
    msg.className = 'msg ok';
    msg.textContent = 'Granted “' + featureEl.value + '” to ' + res.email + '.';
    emailEl.value = '';
    await loadUsers();
  } catch (e) {
    msg.className = 'msg err';
    msg.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

(async function init() {
  ME = await window.__me;           // resolves only if admin
  FEATURES = await api('/admin/features');
  const sel = document.getElementById('grant-feature');
  sel.innerHTML = FEATURES.map(f => '<option value="' + esc(f) + '">' + esc(f) + '</option>').join('');
  await loadUsers();
})();
</script>
</body>
</html>
